name: claude-auto-pr
on:
  pull_request:
    types: [labeled, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

concurrency:
  group: claude-auto-pr-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
      pr: ${{ steps.check.outputs.pr }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          PR_NUM: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          set -euo pipefail
          if [ -z "${PR_NUM}" ]; then echo "run=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          # Must be a real PR (issue_comment also fires on plain issues)
          if ! gh pr view "${PR_NUM}" --json number >/dev/null 2>&1; then
            echo "run=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          # Skip the bots' own activity
          case "${ACTOR}" in
            claude*|github-actions*|*"[bot]") echo "run=false" >> "$GITHUB_OUTPUT"; exit 0;;
          esac
          # Require the auto-merge label
          if gh pr view "${PR_NUM}" --json labels -q '.labels[].name' | grep -Fxq 'auto-merge'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "pr=${PR_NUM}" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  auto:
    needs: guard
    if: needs.guard.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Claude autonomous PR handling
        uses: anthropics/claude-code-action@v1
        env:
          LINK_SLACK_WEBHOOK_URL: ${{ secrets.LINK_SLACK_WEBHOOK_URL }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the autonomous PR pipeline for ${{ github.repository }}.
            Target PR: #${{ needs.guard.outputs.pr }}. Use the `gh` CLI for all GitHub actions.

            ITERATION CAP (do this first):
            - List PR comments and find the latest marker matching `<!-- claude-iter: N -->`.
              If none exists, treat N as 0. This run is iteration N+1 (max 2).

            WORK:
            1. Read CodeRabbit's review comments on the PR. Identify only ACTIONABLE
               suggestions (ignore summaries, praise, and already-resolved threads).
            2. For each actionable item: make the change, commit, and push to the PR's
               head branch. Reply in each thread (resolved, or a short technical reason
               if you disagree). Never force-push. Never edit files under .github/workflows.

            GATE (evaluate after your changes):
            - tests: run `gh pr checks ${{ needs.guard.outputs.pr }}`; the check named
              "tests" must be success (not pending/failure).
            - reviews: zero remaining unresolved actionable CodeRabbit comments.

            DECISION:
            - If GATE passes: `gh pr merge ${{ needs.guard.outputs.pr }} --squash --delete-branch`. Stop.
            - If GATE fails and (N+1) < 2: upsert a comment containing exactly
              `<!-- claude-iter: <N+1> -->` plus a one-line status, then STOP (do not merge).
            - If GATE fails and (N+1) >= 2: ESCALATE:
                * `gh pr edit ${{ needs.guard.outputs.pr }} --remove-label auto-merge --add-label needs-human`
                * post a PR comment starting with `@JimChienTW` summarizing what still fails
                * if LINK_SLACK_WEBHOOK_URL is set, run:
                  curl -s -X POST -H 'Content-Type: application/json' \
                    -d "{\"text\":\"PR #${{ needs.guard.outputs.pr }} in ${{ github.repository }} needs review — auto-pipeline paused after 2 rounds.\"}" \
                    "$LINK_SLACK_WEBHOOK_URL"
                Then stop.
