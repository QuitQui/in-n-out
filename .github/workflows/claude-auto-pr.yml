name: claude-auto-pr
on:
  pull_request:
    types: [labeled, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

concurrency:
  group: claude-auto-pr-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write        # required by claude-code-action for OIDC token exchange

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
      pr: ${{ steps.check.outputs.pr }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          PR_NUM: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          set -euo pipefail
          if [ -z "${PR_NUM}" ]; then echo "run=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          # Must be a real PR (issue_comment also fires on plain issues)
          if ! gh pr view "${PR_NUM}" --json number >/dev/null 2>&1; then
            echo "run=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          # Skip our own automation (Claude / Actions) but ALLOW CodeRabbit through —
          # its review comments are exactly the signal that should wake Claude.
          case "${ACTOR}" in
            claude*|github-actions*) echo "run=false" >> "$GITHUB_OUTPUT"; exit 0;;
          esac
          # Require the auto-merge label
          if gh pr view "${PR_NUM}" --json labels -q '.labels[].name' | grep -Fxq 'auto-merge'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "pr=${PR_NUM}" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  auto:
    needs: guard
    if: needs.guard.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Claude autonomous PR handling
        uses: anthropics/claude-code-action@v1
        env:
          LINK_SLACK_WEBHOOK_URL: ${{ secrets.LINK_SLACK_WEBHOOK_URL }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the autonomous PR pipeline for ${{ github.repository }}.
            Target PR: #${{ needs.guard.outputs.pr }}. Use the `gh` CLI for all GitHub actions.

            STEP 1 — READINESS:
            Check whether CodeRabbit has already reviewed this PR (a coderabbitai review or
            actionable review comments exist). If it has NOT reviewed yet, STOP now: do not
            merge and do not change the iteration marker — you'll be re-invoked when it comments.

            STEP 2 — ADDRESS COMMENTS:
            Read CodeRabbit's ACTIONABLE comments (ignore summaries, praise, resolved threads).
            For each: make the change, commit, push to the PR head branch, and reply in the
            thread (resolve, or give a short technical reason if you disagree). Never force-push;
            never edit files under .github/workflows.

            STEP 3 — ITERATION MARKER:
            Find the latest comment marker `<!-- claude-iter: N -->` (N=0 if none). This run is
            iteration N+1 (max 2).

            GATE (evaluate after your changes):
            - tests: `gh pr checks ${{ needs.guard.outputs.pr }}` shows the "tests" check is
              success (not pending/failure).
            - reviews: CodeRabbit has reviewed AND zero unresolved actionable CodeRabbit comments remain.

            DECISION:
            - If GATE passes: `gh pr merge ${{ needs.guard.outputs.pr }} --squash --delete-branch`. Stop.
            - If GATE fails and (N+1) < 2: upsert a comment containing exactly
              `<!-- claude-iter: <N+1> -->` plus a one-line status, then STOP (do not merge).
            - If GATE fails and (N+1) >= 2: ESCALATE:
                * `gh pr edit ${{ needs.guard.outputs.pr }} --remove-label auto-merge --add-label needs-human`
                * post a PR comment starting with `@JimChienTW` summarizing what still fails
                * if LINK_SLACK_WEBHOOK_URL is set, run:
                  curl -s -X POST -H 'Content-Type: application/json' \
                    -d "{\"text\":\"PR #${{ needs.guard.outputs.pr }} in ${{ github.repository }} needs review — auto-pipeline paused after 2 rounds.\"}" \
                    "$LINK_SLACK_WEBHOOK_URL"
                Then stop.
